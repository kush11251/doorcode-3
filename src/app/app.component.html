
<div *ngIf="showHeader()" class="sticky top-0 z-50 bg-gray-950/95 backdrop-blur-xl border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a [routerLink]="route()" class="flex items-center gap-3">
      <img src="/doorcode_logo.png" alt="DoorCode" class="h-10 w-10 object-contain" />
      <span class="text-lg font-semibold tracking-tight text-white">DoorCode</span>
    </a>

    <div *ngIf="!loggedIn()" class="flex items-center gap-4 text-sm text-gray-300">
      <a routerLink="/" class="hover:text-white transition">Home</a>
      <a routerLink="/contact" class="hover:text-white transition">Contact</a>
      <a routerLink="/privacy" class="hover:text-white transition">Privacy</a>
      <a routerLink="/terms" class="hover:text-white transition">Terms</a>
    </div>

    <div *ngIf="loggedIn()" class="flex items-center gap-3">
      <a routerLink="/profile" class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-sm font-semibold text-white shadow-lg">
        {{ userInitials() || 'KP' }}
      </a>
    </div>
  </div>
</div>

<router-outlet />

<div class="fixed inset-x-2 bottom-4 z-50 mx-auto space-y-2 w-auto max-w-[18rem] sm:right-6 sm:left-auto sm:inset-x-auto sm:bottom-6 sm:mx-0 sm:max-w-sm pointer-events-none">
  <div *ngFor="let toast of toastService.toasts()" class="pointer-events-auto rounded-3xl border p-2.5 sm:p-4 shadow-2xl backdrop-blur-xl"
       [ngClass]="{
         'bg-emerald-500/10 border-emerald-400/20 text-emerald-100': toast.type === 'success',
         'bg-rose-500/10 border-rose-400/20 text-rose-100': toast.type === 'error',
         'bg-sky-500/10 border-sky-400/20 text-sky-100': toast.type === 'info'
       }">
    <div class="flex items-start gap-3">
      <div class="mt-1">
        <div *ngIf="toast.type === 'success'" class="w-8 h-8 rounded-2xl bg-emerald-500/15 flex items-center justify-center text-emerald-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
        </div>
        <div *ngIf="toast.type === 'error'" class="w-8 h-8 rounded-2xl bg-rose-500/15 flex items-center justify-center text-rose-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <div *ngIf="toast.type === 'info'" class="w-8 h-8 rounded-2xl bg-sky-500/15 flex items-center justify-center text-sky-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" /></svg>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold tracking-wide">{{ toast.title }}</p>
        <p class="mt-1 text-xs leading-5 text-white/90">{{ toast.message }}</p>
      </div>
      <button (click)="toastService.dismissToast(toast.id)" class="text-white/70 hover:text-white transition rounded-full p-1 ml-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </div>
</div>
