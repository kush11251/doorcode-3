<div class="min-h-screen bg-gray-950 text-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-5xl mx-auto">
    
    <div class="mb-12 text-center sm:text-left">
      <h2 class="text-3xl font-extrabold text-white tracking-tight">Event Schedule</h2>
      <p class="mt-2 text-gray-400">Friday, April 24, 2026</p>
    </div>

    <div class="relative">
      <div class="hidden sm:block absolute left-[148px] top-12 bottom-0 w-px bg-gradient-to-b from-indigo-500/60 via-transparent to-transparent"></div>

      <div class="space-y-8">
        <ng-container *ngFor="let event of timelineEvents()">
          <div class="relative grid gap-4 sm:grid-cols-[150px_minmax(0,1fr)] items-start group">

            <div class="sm:text-right pt-1 sm:pt-3">
              <div class="text-lg font-mono font-semibold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
                {{ event.startTime }}
              </div>
              <div class="text-sm font-mono text-gray-500 mt-1">
                to {{ event.endTime }}
              </div>
            </div>

            <div class="relative">
              <div class="hidden sm:block absolute -left-[18px] top-5 w-5 h-5 rounded-full border-4 border-gray-950 z-10 transition-all duration-300 group-hover:scale-110"
                   [ngClass]="{
                     'bg-indigo-500 shadow-[0_0_14px_rgba(99,102,241,0.8)]': event.type === 'session',
                     'bg-purple-500 shadow-[0_0_14px_rgba(168,85,247,0.8)]': event.type === 'keynote',
                     'bg-gray-600': event.type === 'break'
                   }">
              </div>

              <div class="bg-white/[0.02] border border-white/[0.05] backdrop-blur-xl rounded-3xl p-7 transition-all duration-300 hover:bg-white/[0.05] hover:border-white/[0.12]"
                   [ngClass]="{'opacity-80': event.type === 'break'}">
                <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-3">
                  <h3 class="text-xl font-bold text-gray-100">{{ event.title }}</h3>
                  <ng-container *ngIf="event.type !== 'session'">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium uppercase tracking-wider"
                          [ngClass]="{
                            'bg-purple-500/10 text-purple-400 border border-purple-500/20': event.type === 'keynote',
                            'bg-gray-800 text-gray-400 border border-gray-700': event.type === 'break'
                          }">
                      {{ event.type }}
                    </span>
                  </ng-container>
                </div>

                <p *ngIf="event.description" class="text-gray-400 text-sm leading-relaxed mb-4">
                  {{ event.description }}
                </p>

                <div *ngIf="event.speaker || event.location" class="grid gap-3 mt-4 pt-4 border-t border-white/[0.05] sm:grid-cols-2">
                  <div *ngIf="event.speaker" class="flex items-center text-sm text-gray-300">
                    <svg class="w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    {{ event.speaker }}
                  </div>
                  <div *ngIf="event.location" class="flex items-center text-sm text-gray-300">
                    <svg class="w-4 h-4 mr-2 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    {{ event.location }}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
