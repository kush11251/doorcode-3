<div class="min-h-screen bg-gray-950 flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10">
    
    <div class="text-center mb-10">
      <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500 tracking-tight">
        DoorCode
      </h1>
      <p class="text-gray-400 mt-3 text-sm font-medium tracking-wide uppercase">
        Enter the portal to your next event
      </p>
    </div>

    <div class="bg-white/[0.02] border border-white/[0.05] backdrop-blur-xl rounded-2xl p-8 shadow-2xl">
      
      <div *ngIf="errorMessage()" class="mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center">
        {{ errorMessage() }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email address</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email"
            class="w-full px-4 py-3 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
            [ngClass]="email.invalid && email.touched ? 'border-red-500/50' : 'border-gray-800'"
            placeholder="you@example.com"
          >
          <p *ngIf="email.invalid && email.touched" class="text-xs text-red-400 mt-1.5">Please enter a valid email address.</p>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
            <!-- <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a> -->
          </div>
          <input 
            type="password" 
            id="password" 
            formControlName="password"
            class="w-full px-4 py-3 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
            [ngClass]="password.invalid && password.touched ? 'border-red-500/50' : 'border-gray-800'"
            placeholder="••••••••"
          >
          <p *ngIf="password.invalid && password.touched" class="text-xs text-red-400 mt-1.5">Password must be at least 6 characters long.</p>
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading()"
          class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-lg shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 disabled:opacity-50 disabled:transform-none disabled:cursor-not-allowed flex justify-center items-center gap-2"
        >
          <ng-container *ngIf="isLoading(); else signInLabel">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing In...
          </ng-container>
          <ng-template #signInLabel>Sign In</ng-template>
        </button>

      </form>

      <p class="mt-8 text-center text-sm text-gray-500">
        Don't have an account? 
        <a href="/signup" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Create an organizer account</a>
      </p>
    </div>
  </div>
</div>
