<div class="min-h-screen bg-gray-950 flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-lg relative z-10 my-8">
    
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500 tracking-tight">
        Join DoorCode
      </h1>
      <p class="text-gray-400 mt-2 text-sm font-medium tracking-wide uppercase">
        Create your organizer account
      </p>
    </div>

    <div class="bg-white/[0.02] border border-white/[0.05] backdrop-blur-xl rounded-2xl p-8 shadow-2xl">
      
      <div *ngIf="errorMessage()" class="mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center">
        {{ errorMessage() }}
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">First name</label>
            <input type="text" formControlName="firstName"
              class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
              [ngClass]="f['firstName'].invalid && f['firstName'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="Jane">
            <p *ngIf="f['firstName'].invalid && f['firstName'].touched" class="text-xs text-red-400 mt-1.5">First name is required.</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Last name</label>
            <input type="text" formControlName="lastName"
              class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
              [ngClass]="f['lastName'].invalid && f['lastName'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="Doe">
            <p *ngIf="f['lastName'].invalid && f['lastName'].touched" class="text-xs text-red-400 mt-1.5">Last name is required.</p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Mobile number</label>
          <input type="tel" formControlName="mobile"
            class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
            [ngClass]="f['mobile'].invalid && f['mobile'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="1234567890">
          <p *ngIf="f['mobile'].invalid && f['mobile'].touched" class="text-xs text-red-400 mt-1.5">Please enter a valid 10-digit mobile number.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email address</label>
          <input type="email" formControlName="email"
            class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
            [ngClass]="f['email'].invalid && f['email'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="you@example.com">
          <p *ngIf="f['email'].invalid && f['email'].touched" class="text-xs text-red-400 mt-1.5">Please enter a valid email address.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <input type="password" formControlName="password"
              class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
              [ngClass]="f['password'].invalid && f['password'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="••••••••">
            <p *ngIf="f['password'].invalid && f['password'].touched" class="text-xs text-red-400 mt-1.5">Minimum 8 characters required.</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
            <input type="password" formControlName="confirmPassword"
              class="w-full px-4 py-2.5 bg-black/40 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-100 placeholder-gray-600 transition-all outline-none"
              [ngClass]="f['confirmPassword'].invalid && f['confirmPassword'].touched ? 'border-red-500/50' : 'border-gray-800'" placeholder="••••••••">
            <p *ngIf="f['confirmPassword'].hasError('passwordsMismatch') && f['confirmPassword'].touched" class="text-xs text-red-400 mt-1.5">Passwords do not match.</p>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading()"
          class="w-full mt-4 py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-lg shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 disabled:opacity-50 disabled:transform-none disabled:cursor-not-allowed flex justify-center items-center gap-2">
          <ng-container *ngIf="isLoading(); else signUpLabel">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating Account...
          </ng-container>
          <ng-template #signUpLabel>Sign Up</ng-template>
        </button>

      </form>

      <p class="mt-8 text-center text-sm text-gray-500">
        Already have an account? 
        <a [routerLink]="['/login']" [queryParams]="{ eventCode: joinEventCode }" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors cursor-pointer">Sign in here</a>
      </p>
    </div>
  </div>
</div>
